name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --dev
          uv sync --group lint

      - name: Run linter (ruff check)
        run: uv run ruff check .

      - name: Check formatting (ruff format --check)
        run: uv run ruff format . --check

      - name: Run tests
        run: uv run pytest -v

      - name: Test CLI --help
        run: uv run audio-summary --help

      - name: Check for common issues
        run: |
          # Check that all Python files have valid syntax
          uv run python -m py_compile src/audio_summary/*.py
          
          # Verify CLI entry point works
          uv run python -c "from audio_summary.cli import main; print('CLI import successful')"
